<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title data-i18n-title="page_title">VoiceTerm — Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
header{background:linear-gradient(135deg,#1e3a5f,#0d2137);padding:24px 32px;border-bottom:1px solid #1e3a5f;display:flex;justify-content:space-between;align-items:center}
.header-left h1{font-size:1.6rem;font-weight:700;color:#60a5fa}
.header-left p{color:#94a3b8;font-size:.9rem;margin-top:4px}
.lang-switch{display:flex;gap:4px}
.lang-btn{padding:6px 10px;background:#0f1117;border:1px solid #2d3748;border-radius:6px;color:#94a3b8;font-size:.8rem;cursor:pointer;transition:all .2s}
.lang-btn:hover{border-color:#3b82f6;color:#e2e8f0}
.lang-btn.active{background:#1e3a5f;border-color:#3b82f6;color:#60a5fa}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
.section{background:#1a1f2e;border:1px solid #2d3748;border-radius:12px;padding:24px;margin-bottom:20px}
.section h2{font-size:1.1rem;font-weight:600;color:#93c5fd;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section h2::before{content:'';display:inline-block;width:4px;height:18px;background:#3b82f6;border-radius:2px}
.hidden{display:none!important}
label{display:block;font-size:.85rem;color:#94a3b8;margin-bottom:6px}
input[type=text],input[type=password],input[type=number],select{width:100%;padding:10px 14px;background:#0f1117;border:1px solid #2d3748;border-radius:8px;color:#e2e8f0;font-size:.95rem;outline:none;transition:border .2s}
input:focus,select:focus{border-color:#3b82f6}
.row{display:flex;gap:12px;margin-bottom:14px;align-items:flex-end}
.row>*{flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#1e3a5f;color:#93c5fd;border:1px solid #2d4a7a}
.btn-secondary:hover{background:#2d4a7a}
.btn-success{background:#166534;color:#86efac;border:1px solid #166534}
.btn-success:hover{background:#15803d}
.status{padding:8px 14px;border-radius:8px;font-size:.85rem;margin-top:10px}
.status.ok{background:#052e16;color:#86efac;border:1px solid #166534}
.status.err{background:#2d0a0a;color:#fca5a5;border:1px solid #7f1d1d}
.status.info{background:#0c1a2e;color:#93c5fd;border:1px solid #1e3a5f}
.net-list,.bt-list{list-style:none;margin-top:10px}
.net-list li,.bt-list li{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#0f1117;border:1px solid #2d3748;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border .2s}
.net-list li:hover,.bt-list li:hover{border-color:#3b82f6}
.net-list li.selected,.bt-list li.selected{border-color:#2563eb;background:#0c1a2e}
.signal{font-size:.8rem;color:#60a5fa}
.progress-bar{height:6px;background:#1e3a5f;border-radius:3px;margin-top:8px}
.progress-fill{height:100%;background:#2563eb;border-radius:3px;transition:width .3s}
.samples-info{font-size:.9rem;color:#94a3b8;margin-top:8px}
.confidence-bar{height:20px;background:#1e3a5f;border-radius:10px;overflow:hidden;margin-top:8px}
.confidence-fill{height:100%;background:#2563eb;border-radius:10px;transition:width .1s;display:flex;align-items:center;padding-left:8px;font-size:.75rem;color:#fff}
.radio-group{display:flex;gap:12px;margin-bottom:14px}
.radio-label{display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px 16px;background:#0f1117;border:1px solid #2d3748;border-radius:8px;flex:1;transition:border .2s}
.radio-label:hover{border-color:#3b82f6}
.radio-label input{accent-color:#3b82f6}
.radio-label.selected{border-color:#2563eb;background:#0c1a2e}
.form-row{margin-bottom:14px}
.toggle{display:flex;align-items:center;gap:10px;cursor:pointer}
.toggle input{accent-color:#2563eb;width:18px;height:18px}
.step-done::after{content:' ✓';color:#86efac}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>🎙 VoiceTerm</h1>
    <p data-i18n="header_subtitle">Voice terminal configuration</p>
  </div>
  <div class="lang-switch">
    <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
    <button class="lang-btn" data-lang="ru" onclick="switchLang('ru')">RU</button>
    <button class="lang-btn" data-lang="de" onclick="switchLang('de')">DE</button>
    <button class="lang-btn" data-lang="zh" onclick="switchLang('zh')">中文</button>
  </div>
</header>
<div class="container">

<!-- WiFi -->
<div class="section" id="sec-wifi">
  <h2 data-i18n="wifi_title">WiFi</h2>
  <button class="btn btn-secondary" onclick="scanWifi()" id="btn-scan-wifi" data-i18n="btn_scan_wifi">🔍 Scan Networks</button>
  <ul class="net-list" id="net-list"></ul>
  <div class="form-row hidden" id="wifi-pass-row">
    <label><span data-i18n="wifi_pass_label">Network password</span> <span id="sel-ssid-label" style="color:#60a5fa"></span></label>
    <input type="password" id="wifi-password" data-i18n-ph="wifi_pass_ph" placeholder="Leave empty for open network">
  </div>
  <button class="btn btn-primary hidden" id="btn-wifi-connect" onclick="connectWifi()" data-i18n="btn_connect_wifi">🔗 Connect</button>
  <div id="wifi-status"></div>
</div>

<!-- Audio Channel -->
<div class="section" id="sec-audio">
  <h2 data-i18n="audio_title">Audio Channel</h2>
  <div class="radio-group">
    <label class="radio-label selected" id="lbl-builtin"><input type="radio" name="audio_channel" value="builtin" checked onchange="onAudioChannel(this)"> <span data-i18n="builtin_radio">🔊 Built-in</span></label>
    <label class="radio-label" id="lbl-bluetooth"><input type="radio" name="audio_channel" value="bluetooth" onchange="onAudioChannel(this)"> <span data-i18n="bt_radio">🔵 Bluetooth</span></label>
  </div>
  <div id="builtin-section">
    <div class="form-row"><label data-i18n="output_dev_label">Output device</label><select id="sel-output-dev"><option value="" data-i18n="loading">Loading...</option></select></div>
    <div class="form-row"><label data-i18n="mic_label">Microphone</label><select id="sel-input-dev"><option value="" data-i18n="loading">Loading...</option></select></div>
    <button class="btn btn-secondary" onclick="loadDevices()" data-i18n="btn_refresh">🔄 Refresh</button>
  </div>
  <div id="bt-section" class="hidden">
    <button class="btn btn-secondary" onclick="startBtScan()" data-i18n="btn_scan_bt">🔍 Start Scan</button>
    <ul class="bt-list" id="bt-list"></ul>
    <div id="bt-status"></div>
  </div>
</div>

<!-- Audio Test -->
<div class="section hidden" id="sec-audio-test">
  <h2 data-i18n="audio_test_title">Audio Test</h2>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
    <button class="btn btn-secondary" onclick="testPlayback()" data-i18n="btn_test_play">▶ Test Playback</button>
    <button class="btn btn-secondary" onclick="testMic()" data-i18n="btn_test_mic">🎙 Test Mic (3 sec)</button>
  </div>
  <div id="audio-test-status"></div>
</div>

<!-- Wake Word -->
<div class="section hidden" id="sec-wakeword">
  <h2 data-i18n="wakeword_title">Wake Word Training</h2>
  <div class="form-row"><label data-i18n="wakeword_label">Wake word</label><input type="text" id="wakeword-text" data-i18n-ph="wakeword_ph" placeholder="Example: Computer"></div>
  <p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px" data-i18n="wakeword_hint">Say the wake word 5 times</p>
  <button class="btn btn-secondary" onclick="recordSample()" id="btn-record-sample">🔴 <span data-i18n="btn_record_sample">Record Sample</span> <span id="sample-count">1</span>/5</button>
  <div class="progress-bar" style="margin-top:12px"><div class="progress-fill" id="samples-progress" style="width:0%"></div></div>
  <p class="samples-info" id="samples-info">Recorded: 0 / 5</p>
  <div style="display:flex;gap:12px;margin-top:12px">
    <button class="btn btn-primary" onclick="generateWakeword()" id="btn-gen-ww" disabled data-i18n="btn_gen_model">⚙ Generate Model</button>
    <button class="btn btn-secondary" onclick="clearSamples()" data-i18n="btn_reset">🗑 Reset</button>
  </div>
  <div id="wakeword-gen-status"></div>
  <div id="wakeword-test-block" class="hidden" style="margin-top:16px">
    <button class="btn btn-secondary" onclick="testWakeword()" data-i18n="btn_test_ww">🎯 Test (10 sec)</button>
    <div class="confidence-bar"><div class="confidence-fill" id="conf-fill" style="width:0%">0%</div></div>
    <div id="ww-test-status"></div>
  </div>
</div>

<!-- Hermes -->
<div class="section hidden" id="sec-hermes">
  <h2 data-i18n="hermes_title">Hermes Agent</h2>
  <div class="form-row"><label data-i18n="ws_url_label">WebSocket URL</label><input type="text" id="hermes-url" placeholder="ws://192.168.1.100:8765"></div>
  <button class="btn btn-secondary" onclick="checkHermes()" data-i18n="btn_check_hermes">🔌 Check Connection</button>
  <div id="hermes-status"></div>
</div>

<!-- System -->
<div class="section hidden" id="sec-system">
  <h2 data-i18n="system_title">System Settings</h2>
  <div class="row">
    <div class="form-row"><label data-i18n="rms_label">Silence RMS</label><input type="number" id="cfg-rms" value="200" min="50" max="2000"></div>
    <div class="form-row"><label data-i18n="silence_ms_label">Silence ms</label><input type="number" id="cfg-silence-ms" value="1500" min="500" max="5000"></div>
  </div>
  <div class="row">
    <div class="form-row"><label data-i18n="threshold_label">Threshold</label><input type="number" id="cfg-threshold" value="0.8" min="0" max="1" step="0.05"></div>
    <div class="form-row"><label data-i18n="relax_label">Relaxation</label><input type="number" id="cfg-relax" value="2.0" min="0.5" max="10" step="0.5"></div>
  </div>
  <div class="row">
    <div class="form-row"><label data-i18n="window_label">Window</label><input type="number" id="cfg-window" value="1.5" min="1.5" max="5" step="0.25"></div>
    <div class="form-row"><label data-i18n="slide_label">Slide</label><input type="number" id="cfg-slide" value="0.75" min="0.25" max="2" step="0.25"></div>
  </div>
  <div class="form-row"><label data-i18n="stt_label">STT Model</label>
    <select id="cfg-stt">
      <option value="tiny" data-i18n="stt_tiny">tiny</option>
      <option value="base" selected data-i18n="stt_base">base</option>
      <option value="small" data-i18n="stt_small">small</option>
    </select>
  </div>
  <div class="form-row"><label class="toggle"><input type="checkbox" id="cfg-beep" checked> <span data-i18n="beep_label">Beep on activation</span></label></div>
  <button class="btn btn-success" style="margin-top:8px;width:100%" onclick="saveAndLaunch()" data-i18n="btn_save">✅ Save and Launch</button>
  <div id="save-status"></div>
</div>

</div>
<script src="/static/app.js"></script>
</body>
</html>
